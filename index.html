<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Boda · Sebastián y Pamela</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;width:100%;overflow:hidden;font-family:sans-serif;}
  body{background:#cdddee;}

  /* --- PORTADA --- */
  .cover{
    position:fixed;inset:0;z-index:100;
    background:#cdddee;
    display:flex;align-items:center;justify-content:center;
    transition:opacity .6s ease,visibility .6s ease;
  }
  .cover.hidden{opacity:0;visibility:hidden;pointer-events:none;}
  .cover-wrap{
    position:relative;
    max-width:100%;max-height:100vh;
    display:inline-block;
  }
  .cover-wrap img{
    display:block;
    max-width:100%;
    max-height:100vh;
    width:auto;height:auto;
  }
  .btn-hotspot{
    position:absolute;
    left:46.9%;top:78.7%;
    width:29.4%;height:10%;
    background:transparent;
    cursor:pointer;
    border-radius:999px;
    z-index:2;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-hotspot:active{background:rgba(29,45,107,0.08);}

  /* --- CANVA IFRAME --- */
  .after-open{
    display:none;
    position:fixed;inset:0;z-index:50;
    background:#cdddee;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:32px;
  }
  .after-open.active{display:flex;}
  .after-open p{
    font-family:'Cormorant Garamond',serif;
    font-size:1.4rem;
    color:#1d2d6b;
    line-height:1.5;
    margin-bottom:20px;
  }
  .after-open a{
    font-family:'Cormorant Garamond',serif;
    font-size:1.1rem;
    color:#c2a14d;
    text-decoration:underline;
  }

  /* --- BOTÓN MÚSICA --- */
  .music-btn{
    display:none;
    position:fixed;
    bottom:16px;right:16px;
    z-index:200;
    width:48px;height:48px;
    border-radius:50%;
    background:rgba(29,45,107,.85);
    color:#fff;
    border:none;
    cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
    font-size:20px;
    align-items:center;justify-content:center;
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    transition:background .2s;
  }
  .music-btn.visible{display:flex;}
  .music-btn:hover{background:rgba(29,45,107,.95);}
  .music-btn:active{transform:scale(.93);}
</style>
</head>
<body>

  <!-- PANTALLA POST-APERTURA -->
  <div class="after-open" id="afterOpen">
    <p>La musica esta sonando.<br>Disfruta de la invitacion.</p>
    <a href="https://invitacion-boda-sebastian-pamela.my.canva.site/boda" target="_blank">Volver a abrir la invitacion</a>
  </div>

  <!-- BOTÓN PLAY/PAUSE -->
  <button class="music-btn" id="musicBtn" aria-label="Pausar música">🔊</button>

<script>
  const CANVA_URL = "https://invitacion-boda-sebastian-pamela.my.canva.site/boda";
  const audio = document.getElementById("musica");
  const cover = document.getElementById("cover");
  const afterOpen = document.getElementById("afterOpen");
  const musicBtn = document.getElementById("musicBtn");
  let playing = false;

  document.getElementById("openBtn").addEventListener("click", function(e){
    e.preventDefault();

    // Iniciar música
    audio.volume = 0.5;
    audio.play().then(()=>{
      playing = true;
      musicBtn.textContent = "🔊";
    }).catch(()=>{});

    // Abrir Canva en nueva pestaña
    window.open(CANVA_URL, "_blank");

    // Mostrar pantalla de música
    afterOpen.classList.add("active");

    // Ocultar portada
    cover.classList.add("hidden");

    // Mostrar botón de música
    musicBtn.classList.add("visible");
  });

  // Toggle música
  musicBtn.addEventListener("click", function(){
    if(playing){
      audio.pause();
      playing = false;
      musicBtn.textContent = "🔇";
    } else {
      audio.play();
      playing = true;
      musicBtn.textContent = "🔊";
    }
  });
</script>
